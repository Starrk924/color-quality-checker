<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Color Quality Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #1e1e1e;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }
    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
    }

    /* ── Actions ── */
    .actions {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }
    .btn-check {
      width: 100%;
      height: 36px;
      background: #18a0fb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-check:hover:not(:disabled) { background: #0d8de0; }
    .btn-check:active:not(:disabled) { background: #0878c5; }
    .btn-check:disabled {
      background: #a8d8f8;
      cursor: not-allowed;
    }

    /* ── Spinner ── */
    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results area ── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .results:empty::after {
      content: 'Select a frame and click "Check selected frame" to begin.';
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 24px;
      display: block;
    }

    /* ── Success banner ── */
    .banner-success {
      padding: 12px 14px;
      background: #f0faf5;
      border: 1px solid #6fdb9e;
      border-radius: 8px;
      color: #1a7a4a;
      font-weight: 600;
      font-size: 12px;
      text-align: center;
    }

    /* ── Warning banner (user error / bad selection) ── */
    .banner-warn {
      padding: 12px 14px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      color: #92400e;
      font-size: 12px;
    }

    /* ── Error summary ── */
    .summary {
      padding: 10px 14px;
      background: #fff1f1;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-weight: 600;
      font-size: 12px;
    }

    /* ── Individual error card ── */
    .error-card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fafafa;
    }
    .error-card:hover { background: #f5f5f5; }

    .card-info { flex: 1; min-width: 0; }

    .layer-name {
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }
    .tag-fill    { background: #eff6ff; color: #1d4ed8; }
    .tag-stroke  { background: #f5f3ff; color: #6d28d9; }
    .tag-style   { background: #fef9c3; color: #92400e; }
    .tag-raw     { background: #fff1f1; color: #b91c1c; }

    .color-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
    }
    .swatch {
      width: 11px;
      height: 11px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.12);
      flex-shrink: 0;
    }
    .color-value {
      font-size: 11px;
      color: #555;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .style-value {
      font-size: 11px;
      color: #555;
      font-style: italic;
    }

    /* ── Focus button ── */
    .btn-focus {
      flex-shrink: 0;
      align-self: center;
      height: 28px;
      padding: 0 10px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn-focus:hover {
      background: #f3f4f6;
      border-color: #9ca3af;
    }
    .btn-focus:active {
      background: #e5e7eb;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      font-size: 10px;
      color: currentColor;
      opacity: 0.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .breadcrumb-sep { margin: 0 2px; }
    .breadcrumb-last { font-weight: 600; opacity: 1; }

    /* ── Group section ── */
    .group-section { display: flex; flex-direction: column; gap: 8px; }
    .group-section > summary {
      list-style: none;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      padding: 2px 0 6px;
      cursor: pointer;
      user-select: none;
    }
    .group-section > summary::-webkit-details-marker { display: none; }
    .group-section > summary::before { content: '▾ '; font-size: 9px; }
    .group-section[open] > summary::before { content: '▾ '; }
    .group-section:not([open]) > summary::before { content: '▸ '; }

    /* ── Scrollbar ── */
    .results::-webkit-scrollbar { width: 6px; }
    .results::-webkit-scrollbar-track { background: transparent; }
    .results::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
    .results::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Color Quality Checker</h1>
    <p>Every color must reference a Figma Variable — no styles, no raw values.</p>
  </div>

  <div class="actions">
    <button class="btn-check" id="checkBtn">
      Check selected frame
    </button>
  </div>

  <div class="results" id="results"></div>

  <script>
    const checkBtn = document.getElementById('checkBtn');
    const results  = document.getElementById('results');

    // ── Send check request ──────────────────────────────────────────────────
    checkBtn.addEventListener('click', () => {
      setLoading(true);
      results.innerHTML = '';
      parent.postMessage({ pluginMessage: { type: 'check' } }, '*');
    });

    // ── Receive results ─────────────────────────────────────────────────────
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      setLoading(false);

      if (msg.type === 'success') {
        renderSuccess();
        return;
      }
      if (msg.type === 'error') {
        renderWarn(msg.message);
        return;
      }
      if (msg.type === 'results') {
        renderErrors(msg.errors);
        return;
      }
    };

    // ── Renderers ───────────────────────────────────────────────────────────
    function renderSuccess() {
      results.innerHTML = `
        <div class="banner-success">
          ✅&nbsp; No errors found — all colors use variables
        </div>`;
    }

    function renderWarn(message) {
      results.innerHTML = `
        <div class="banner-warn">
          ⚠️&nbsp; ${esc(message)}
        </div>`;
    }

    function buildCard(e) {
      const card = document.createElement('div');
      card.className = 'error-card';

      const info = document.createElement('div');
      info.className = 'card-info';

      // Breadcrumb
      if (e.path && e.path.length > 0) {
        const crumb = document.createElement('div');
        crumb.className = 'breadcrumb';
        const ancestors = e.path.slice(0, -1);
        const lastName  = e.path[e.path.length - 1];
        let crumbHTML = ancestors
          .map(n => `<span>${esc(n)}</span>`)
          .join('<span class="breadcrumb-sep">›</span>');
        if (crumbHTML) crumbHTML += '<span class="breadcrumb-sep">›</span>';
        crumbHTML += `<span class="breadcrumb-last">${esc(lastName)}</span>`;
        crumb.innerHTML = crumbHTML;
        info.appendChild(crumb);
      }

      // Layer name
      const name = document.createElement('div');
      name.className = 'layer-name';
      name.title = e.nodeName;
      name.textContent = e.nodeName;
      info.appendChild(name);

      // Tags
      const tags = document.createElement('div');
      tags.className = 'tags';
      const propTag = document.createElement('span');
      propTag.className = e.property === 'Fill' ? 'tag tag-fill' : 'tag tag-stroke';
      propTag.textContent = e.property;
      const errTag = document.createElement('span');
      errTag.className = e.errorType === 'Style' ? 'tag tag-style' : 'tag tag-raw';
      errTag.textContent = e.errorType;
      tags.appendChild(propTag);
      tags.appendChild(errTag);
      info.appendChild(tags);

      // Color detail
      const row = document.createElement('div');
      row.className = 'color-row';
      if (/^#[0-9a-f]{6}$/i.test(e.value)) {
        const swatch = document.createElement('span');
        swatch.className = 'swatch';
        swatch.style.background = e.value;
        const val = document.createElement('span');
        val.className = 'color-value';
        val.textContent = e.value;
        row.appendChild(swatch);
        row.appendChild(val);
      } else {
        const val = document.createElement('span');
        val.className = 'style-value';
        val.textContent = '🎨 ' + e.value;
        row.appendChild(val);
      }
      info.appendChild(row);

      // Focus button
      const btn = document.createElement('button');
      btn.className = 'btn-focus';
      btn.textContent = 'Focus';
      btn.addEventListener('click', () => {
        parent.postMessage(
          { pluginMessage: { type: 'focus', nodeId: e.nodeId } },
          '*'
        );
      });

      card.appendChild(info);
      card.appendChild(btn);
      return card;
    }

    function renderErrors(errors) {
      results.innerHTML = '';

      const count = errors.length;
      const summary = document.createElement('div');
      summary.className = 'summary';
      summary.textContent = `❌  ${count} error${count !== 1 ? 's' : ''} found`;
      results.appendChild(summary);

      // Group by top-level frame (path[0])
      const groups = new Map();
      for (const e of errors) {
        const key = (e.path && e.path[0]) ?? '(unknown)';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(e);
      }

      const multipleGroups = groups.size > 1;

      for (const [frameName, frameErrors] of groups) {
        if (multipleGroups) {
          const section = document.createElement('details');
          section.className = 'group-section';
          section.open = true;
          const sum = document.createElement('summary');
          sum.textContent = `${frameName}  (${frameErrors.length})`;
          section.appendChild(sum);
          for (const e of frameErrors) section.appendChild(buildCard(e));
          results.appendChild(section);
        } else {
          for (const e of frameErrors) results.appendChild(buildCard(e));
        }
      }
    }

    // ── Loading state ───────────────────────────────────────────────────────
    function setLoading(on) {
      checkBtn.disabled = on;
      checkBtn.innerHTML = on
        ? '<span class="spinner"></span> Checking…'
        : 'Check selected frame';
    }

    // ── XSS-safe escape ─────────────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }
  </script>
</body>
</html>
